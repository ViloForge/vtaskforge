name: Chart

# Publishes the vtaskforge Helm chart as an OCI artifact to
# ghcr.io/viloforge/charts/vtaskforge on every v* tag (chart version = tag).
# Pairs with docker.yml (image) — both fire from the same release tag.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version to publish (e.g. 2026.623.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: chart-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-chart:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve version
        id: v
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package + push chart
        run: |
          set -euo pipefail
          helm package charts/vtaskforge \
            --version "${{ steps.v.outputs.version }}" \
            --app-version "${{ steps.v.outputs.version }}"
          helm push "vtaskforge-${{ steps.v.outputs.version }}.tgz" oci://ghcr.io/viloforge/charts
