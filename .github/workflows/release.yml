name: Release

# Cuts a CalVer tag (vYYYY.MDD.P) + a GitHub Release. NO npm publishing.
#
# This fork ships as a container image + an OCI Helm chart, both built from the
# resulting v* tag by docker.yml (image) and chart.yml (chart). The inherited
# Paperclip npm release flow (scripts/release.sh canary/stable, npm dist-tags)
# is intentionally NOT used — we do not publish npm packages.
#
# Versioning: YYYY.{M}{DD}.{P} — UTC month (no leading zero), zero-padded day,
# same-day patch slot. Run on demand; defaults to today's date.

on:
  workflow_dispatch:
    inputs:
      date:
        description: "UTC date YYYY-MM-DD (default: today) -> version YYYY.MDD.P"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need all tags to compute the same-day patch slot

      - name: Compute CalVer
        id: ver
        run: |
          set -euo pipefail
          DATE="${{ inputs.date }}"
          [ -n "$DATE" ] || DATE="$(date -u +%F)"
          Y="$(date -u -d "$DATE" +%Y)"
          M="$(date -u -d "$DATE" +%-m)"   # month, no leading zero
          D="$(date -u -d "$DATE" +%d)"    # day, zero-padded
          BASE="${Y}.${M}${D}"
          git fetch --tags --quiet || true
          P="$(git tag -l "v${BASE}.*" | wc -l | tr -d ' ')"
          VER="${BASE}.${P}"
          echo "Computed version: ${VER}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"

      - name: Create + push tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.ver.outputs.tag }}" --generate-notes --title "${{ steps.ver.outputs.version }}"
