{{- if .Values.ingress.certResolverViaCertManager }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "paperclip.fullname" . }}-tls
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  secretName: {{ include "paperclip.fullname" . }}-tls
  issuerRef:
    name: {{ .Values.certificate.issuerName }}
    kind: {{ .Values.certificate.issuerKind }}
  dnsNames:
    - {{ .Values.ingress.host }}
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "paperclip.fullname" . }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.ingress.entryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.host }}`)
      services:
        - name: {{ include "paperclip.fullname" . }}
          port: {{ .Values.server.port }}
  tls:
    secretName: {{ include "paperclip.fullname" . }}-tls
